name: Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  tests:
    name: tests (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24, 26]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Preparing tests
        run: npm install
      - name: Start Redis
        run: docker compose -f mocko-tests/docker-compose.yaml up -d
      - name: Testing
        run: npm run test:full
      - name: Stop Redis
        if: always()
        run: docker compose -f mocko-tests/docker-compose.yaml down -v
