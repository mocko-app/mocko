{{- $secretName := include "mocko.fullname" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $deploySecret := "" }}
{{- $redisPassword := "" }}
{{- if $existing }}
{{- $deploySecret = index $existing.data "deploy-secret" | b64dec }}
{{- $redisPassword = index $existing.data "redis-password" | default "" | b64dec }}
{{- if not $redisPassword }}
{{- $redisPassword = randAlphaNum 32 }}
{{- end }}
{{- else }}
{{- $deploySecret = randAlphaNum 64 }}
{{- $redisPassword = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "mocko.labels" . | nindent 4 }}
type: Opaque
data:
  deploy-secret: {{ $deploySecret | b64enc | quote }}
  redis-password: {{ $redisPassword | b64enc | quote }}
