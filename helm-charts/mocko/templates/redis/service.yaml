{{- if and .Values.persistence.redis.enabled .Values.persistence.redis.internal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mocko.redis.fullname" . }}
  labels:
    {{- include "mocko.redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "mocko.redis.selectorLabels" . | nindent 4 }}
{{- end }}
