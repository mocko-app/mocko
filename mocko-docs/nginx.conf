server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    absolute_redirect off;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Old MkDocs URLs used trailing slashes; the static export does not.
    rewrite ^/docs/(.+)/$ /docs/$1 permanent;

    # Legacy v1 docs paths (old MkDocs site + URLs printed by the v1 CLI),
    # forwarded here by the docs.mocko.dev -> mocko.dev/docs redirect.
    location ~ ^/docs/(updating-node|deploying|templating(?:/(?:helpers|persistence|variables))?)$ {
        return 301 /docs/v1/$1;
    }

    location ~ ^/docs/getting-started/(standalone|complete)$ {
        return 301 /docs/v1/getting-started/$1;
    }

    location = /docs {
        return 301 /docs/;
    }

    location /docs/_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /docs/ {
        try_files $uri $uri.html $uri/index.html =404;
    }

    error_page 404 /docs/404.html;

    location = /healthz {
        default_type text/plain;
        return 200 "ok";
    }

    location = / {
        return 301 /docs/;
    }
}
